<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portfólio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .profile {
            text-align: center;
            margin-bottom: 24px;
        }

        .profile h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: #38bdf8;
        }

        .profile p {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .emoji-pointer {
            font-size: 1.8rem;
            margin-top: 15px;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(8px); }
        }

        .links-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            text-align: center;
            text-decoration: none;
            color: #ffffff;
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #38bdf8;
            color: #0f172a;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="profile">
        <h1>Front-end Developer</h1>
        <p>Projetos de logística e negócios</p>
        <div class="emoji-pointer">👇</div>
    </div>

    <div class="links-container">
        <a href="https://github.com/threal7x" target="_blank" class="btn">💻 GitHub</a>
        <a href="https://linkedin.com/in/thferreiradev" target="_blank" class="btn">👔 LinkedIn</a>
        <a href="https://thlog-logistica.vercel.app" target="_blank" class="btn">🚀 Projetos Recentes</a>
        <a href="https://wa.me/5592981343815" target="_blank" class="btn">💬 WhatsApp</a>
    </div>

</body>
</html>
